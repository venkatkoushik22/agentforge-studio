name: AgentForge CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agentforge-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install core dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python source
        run: python -m compileall -q src tests

      - name: Run unit tests
        run: |
          python -m unittest discover \
            -s tests \
            -p "test_*.py" \
            -v

  full-stack-smoke-test:
    name: Generated full-stack smoke test
    runs-on: ubuntu-latest
    needs: python-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate test application
        id: generate
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from src.agents.generator import generate_project
          from src.agents.planner import plan_project

          requirement = (
              "Build CI Board, a React task management dashboard "
              "using FastAPI and PostgreSQL with login, search, "
              "analytics, notifications, and admin roles."
          )

          plan = plan_project(requirement)

          project_directory = generate_project(
              plan,
              output_root=Path("ci_generated"),
              overwrite=True,
          )

          with open(
              os.environ["GITHUB_OUTPUT"],
              "a",
              encoding="utf-8",
          ) as output_file:
              output_file.write(
                  f"project_dir="
                  f"{project_directory.as_posix()}\n"
              )

          print(
              f"Generated project: {project_directory}"
          )
          PY

      - name: Install generated frontend dependencies
        shell: bash
        run: |
          cd "${{ steps.generate.outputs.project_dir }}/frontend"
          npm install --no-audit --no-fund

      - name: Test, scan, and evaluate generated project
        env:
          PROJECT_DIR: ${{ steps.generate.outputs.project_dir }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from src.agents.tester import write_test_report
          from src.evaluation.evaluator import (
              write_evaluation_report,
          )
          from src.security.scanner import write_report

          project_directory = Path(
              os.environ["PROJECT_DIR"]
          )

          test_path = write_test_report(
              project_directory,
              run_frontend_build=True,
          )

          security_path = write_report(
              project_directory
          )

          evaluation_path = write_evaluation_report(
              project_directory
          )

          test_report = json.loads(
              test_path.read_text(encoding="utf-8")
          )

          security_report = json.loads(
              security_path.read_text(encoding="utf-8")
          )

          evaluation_report = json.loads(
              evaluation_path.read_text(encoding="utf-8")
          )

          assert test_report["status"] == "passed", (
              f"Generated-project tests failed: "
              f"{test_report}"
          )

          assert security_report["status"] == "passed", (
              f"Security scan failed: "
              f"{security_report}"
          )

          assert (
              evaluation_report["overall_score"]
              == 100.0
          ), (
              f"Quality score was not 100: "
              f"{evaluation_report}"
          )

          print("Generated application tests: passed")
          print("Security scan: passed")
          print("Quality evaluation: 100.0%")
          PY

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agentforge-ci-reports
          path: |
            ${{ steps.generate.outputs.project_dir }}/test_report.json
            ${{ steps.generate.outputs.project_dir }}/security_report.json
            ${{ steps.generate.outputs.project_dir }}/evaluation_report.json
          if-no-files-found: warn
          retention-days: 7